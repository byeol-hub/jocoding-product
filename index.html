
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <meta name="google-adsense-account" content="ca-pub-9512119373013148">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9512119373013148" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="theme-row">
            <button id="theme-toggle-btn" type="button" aria-label="Toggle theme">🌙 Dark</button>
        </div>
        <h1>Lotto Number Generator</h1>
        <p>Click the button to generate your lucky numbers!</p>
        <button id="generator-btn">Generate Numbers</button>
        <lotto-numbers></lotto-numbers>

        <section class="inquiry-section">
            <h2>Partnership Inquiry</h2>
            <form class="inquiry-form" action="https://formspree.io/f/mjgawqqo" method="POST">
                <input type="text" name="name" placeholder="Your name" required>
                <input type="email" name="email" placeholder="Your email" required>
                <input type="text" name="company" placeholder="Company / Brand">
                <textarea name="message" placeholder="Tell us about your partnership proposal" rows="4" required></textarea>
                <input type="hidden" name="_subject" value="New partnership inquiry">
                <button type="submit">Send Inquiry</button>
            </form>
        </section>
    </div>
    <script src="main.js"></script>
</body>
</html>
